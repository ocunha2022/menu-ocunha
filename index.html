<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Menu O'CUNHA</title>

<style>

body {
  margin:0;
  padding:20px;
  font-family: Georgia, serif;
  color:#ddd;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,0.03), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(255,255,255,0.02), transparent 40%),
    #0b0b0b;
}

.container {
  max-width:600px;
  margin:auto;
}

/* LOGO FIX PROFISSIONAL */
.logo {
  text-align:center;
  margin-bottom:15px;
  overflow:hidden;
}

.logo img {
  width:260px;
  display:block;
  margin:auto;

  /* remove visual do fundo */
  mix-blend-mode: screen;

  /* melhora contraste */
  filter: brightness(1.3) contrast(1.15);

  /* corta espaço morto */
  transform: scale(1.35);
}

/* ACORDEÃO */
.accordion {
  border-bottom:1px solid #2a2a2a;
}

.accordion-header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 0;
  cursor:pointer;
  color:#c6a15b;
  font-size:20px;
  letter-spacing:1px;
}

.accordion-header span {
  transition: transform 0.3s ease;
  color:#7a5c2c;
}

.accordion.open .accordion-header span {
  transform: rotate(180deg);
}

/* CONTEÚDO */
.accordion-content {
  max-height:0;
  overflow:hidden;
  transition: max-height 0.35s ease;
}

/* ITENS */
.item {
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid #1a1a1a;
  font-size:17px;
}

.item:last-child {
  border-bottom:none;
}

.price {
  color:#c6a15b;
}

/* LOADER */
.loader {
  text-align:center;
  margin-top:50px;
  color:#666;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
  <img src="logo.png">
</div>

<div id="menu">
  <div class="loader">A carregar menu...</div>
</div>

</div>

<script>

const url = "https://opensheet.elk.sh/1-0TGjRLQaRqQACX60c44soR7N76XhOve0bO0f8nk17k/1";

fetch(url)
  .then(res => res.json())
  .then(data => {

    const container = document.getElementById("menu");
    container.innerHTML = "";

    const grouped = {};

    data.forEach(item => {

      const categoria = item.Categoria?.trim();
      const produto = item.Produto?.trim();
      const preco = item.Preco?.trim();

      if (!categoria || !produto) return;

      if (!grouped[categoria]) {
        grouped[categoria] = [];
      }

      grouped[categoria].push({ produto, preco });

    });

    Object.keys(grouped).forEach(category => {

      const accordion = document.createElement("div");
      accordion.className = "accordion";

      const header = document.createElement("div");
      header.className = "accordion-header";

      header.innerHTML = `
        <div>${category}</div>
        <span>▼</span>
      `;

      const content = document.createElement("div");
      content.className = "accordion-content";

      grouped[category].forEach(item => {
        content.innerHTML += `
          <div class="item">
            <span>${item.produto}</span>
            <span class="price">${item.preco || ""}</span>
          </div>
        `;
      });

      header.addEventListener("click", () => {

        const isOpen = accordion.classList.contains("open");

        document.querySelectorAll(".accordion").forEach(acc => {
          acc.classList.remove("open");
          acc.querySelector(".accordion-content").style.maxHeight = null;
        });

        if (!isOpen) {
          accordion.classList.add("open");
          content.style.maxHeight = content.scrollHeight + "px";
        }

      });

      accordion.appendChild(header);
      accordion.appendChild(content);

      container.appendChild(accordion);

    });

  });

</script>

</body>
</html>
